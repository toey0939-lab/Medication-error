<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medication Error System - Med Male 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .severity-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        input:focus, select:focus, textarea:focus { border-color: #4f46e5; ring: 2px; ring-color: #4f46e5; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center">
                <i class="fa-solid fa-pills mr-2"></i>Med Male 1 - ME System
            </h1>
            <div id="syncStatus" class="text-slate-400 text-[10px] font-bold uppercase">
                <i class="fa-solid fa-circle-notch fa-spin mr-1"></i>ตรวจสอบข้อมูล...
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <!-- Form -->
        <div class="card p-6 md:p-8 space-y-6 border-t-4 border-t-indigo-500 shadow-xl">
            <h2 class="text-lg font-bold text-slate-700 flex items-center border-b pb-4">
                <i class="fa-solid fa-clipboard-list mr-2 text-indigo-500"></i>บันทึกรายงานอุบัติการณ์
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">วันที่เกิดเหตุ *</label>
                    <input type="date" id="eventDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">เลข HN ผู้ป่วย *</label>
                    <input type="text" id="hn" list="hnList" placeholder="ระบุ HN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="hnList"></datalist>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ขั้นตอนที่เกิดความคลาดเคลื่อน *</label>
                    <select id="process" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        <option value="">-- เลือกขั้นตอนที่เกิดปัญหา --</option>
                        <option value="Prescribing">Prescribing : สั่งยา (เช่น แพทย์สั่งยาผิดขนาด/ผิดชนิด)</option>
                        <option value="Transcribing">Transcribing : คัดลอก (เช่น พยาบาลลงบันทึกยาไม่ตรงกับคำสั่งแพทย์)</option>
                        <option value="Dispensing">Dispensing : จัด/จ่ายยา (เช่น ห้องยาจัดยาผิด หรือจัดยา LASA มาให้)</option>
                        <option value="Administration">Administration : บริหารยา (เช่น ให้ยาผิดคน ผิดเวลา หรือผิดเทคนิค)</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ชื่อยาที่มีปัญหา *</label>
                    <input type="text" id="drugName" list="drugList" placeholder="พิมพ์ชื่อยา..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="drugList"></datalist>
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ระดับความรุนแรง (A-I) *</label>
                <select id="severity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <option value="">-- เลือกระดับความรุนแรง --</option>
                    <optgroup label="Near Miss (ยังไม่ถึงตัวผู้ป่วย)">
                        <option value="A">ระดับ A : มีโอกาสเกิด (เช่น พบยา LASA วางปนกันแต่ยังไม่มีการสั่งยา)</option>
                        <option value="B">ระดับ B : เกิดผิดพลาดแต่หยุดทัน (เช่น ห้องยาจัดยาผิดแต่พยาบาลทักท้วงทันก่อนฉีด)</option>
                    </optgroup>
                    <optgroup label="No Harm (ถึงตัวผู้ป่วยแต่ไม่เกิดอันตราย)">
                        <option value="C">ระดับ C : ถึงตัวผู้ป่วยแต่ไม่เกิดอันตราย (เช่น ให้ยาผิดมื้อแต่ผู้ป่วยปกติ)</option>
                        <option value="D">ระดับ D : ถึงตัวผู้ป่วย ต้องเฝ้าระวังเพิ่ม (เช่น ให้ยาผิดตัว ต้องเจาะเลือดติดตามผล)</option>
                    </optgroup>
                    <optgroup label="Harm (เกิดอันตรายต่อผู้ป่วย)">
                        <option value="E">ระดับ E : อันตรายชั่วคราว ต้องรักษาเพิ่ม (เช่น ความดันตกจากการให้ยาเกิน ต้องให้สารน้ำช่วย)</option>
                        <option value="F">ระดับ F : อันตรายชั่วคราว ต้องนอน รพ. นานขึ้น (เช่น แพ้ยาจนต้องอยู่ดูอาการเพิ่มจากเดิม)</option>
                        <option value="G">ระดับ G : อันตรายถาวร (เช่น ให้ยาผิดจนผู้ป่วยเกิดภาวะพิการหรือสูญเสียหน้าที่อวัยวะ)</option>
                        <option value="H">ระดับ H : เกือบเสียชีวิต (เช่น หัวใจหยุดเต้นจากการให้ยาผิด ต้องกู้ชีพ CPR)</option>
                        <option value="I">ระดับ I : เสียชีวิต (เช่น บริหารยา High Alert Drug ผิดพลาด เช่น IV Push KCL)</option>
                    </optgroup>
                </select>
            </div>

            <textarea id="details" rows="3" placeholder="ระบุรายละเอียดเหตุการณ์..." class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50"></textarea>
            
            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ผู้รายงาน *</label>
                <input type="text" id="reporter" list="reporterList" placeholder="ระบุชื่อผู้รายงาน" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                <datalist id="reporterList"></datalist>
            </div>

            <button onclick="saveError()" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงาน
            </button>
        </div>

        <!-- Filter Section -->
        <div class="card p-5 space-y-4 border-l-4 border-l-indigo-400">
            <h3 class="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-filter mr-2"></i>กรองข้อมูล Dashboard & ประวัติ
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold ml-1">เริ่ม</span>
                    <div class="flex space-x-1">
                        <select id="startMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                        <select id="startYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                    </div>
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold ml-1">สิ้นสุด</span>
                    <div class="flex space-x-1">
                        <select id="endMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                        <select id="endYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                    </div>
                </div>
            </div>
            <button onclick="resetFilters()" class="text-[10px] text-indigo-500 font-bold underline">ล้างตัวกรอง (ดูทั้งหมด)</button>
        </div>

        <!-- Dashboard -->
        <div class="space-y-3">
            <div class="flex justify-between items-end px-1">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">สรุปผลตามตัวกรอง</h2>
                <span id="filterLabel" class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">ข้อมูลทั้งหมด</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="card p-4 text-center border-slate-100"><p class="text-[10px] text-slate-400 font-bold">รวม</p><p id="statTotal" class="text-2xl font-bold text-indigo-600">-</p></div>
                <div class="card p-4 text-center bg-emerald-50 border-emerald-100"><p class="text-[10px] text-emerald-600 font-bold">A-B</p><p id="statNearMiss" class="text-2xl font-bold text-emerald-700">-</p></div>
                <div class="card p-4 text-center bg-amber-50 border-amber-100"><p class="text-[10px] text-amber-600 font-bold">C-D</p><p id="statError" class="text-2xl font-bold text-amber-700">-</p></div>
                <div class="card p-4 text-center bg-rose-50 border-rose-100"><p class="text-[10px] text-rose-600 font-bold">E-I</p><p id="statHarm" class="text-2xl font-bold text-rose-700">-</p></div>
            </div>
        </div>

        <div id="historyList" class="space-y-4"></div>
    </main>

    <div id="alertContainer" class="fixed top-5 left-4 right-4 z-[110] flex flex-col space-y-2 pointer-events-none"></div>

    <script>
        const CONFIG = { scriptUrl: "https://script.google.com/macros/s/AKfycbymRwhneDoq2c7spuZVQ9MWB1Nv7igtnMEpi_jrL-Em0nXzE4_a5n22ecAYIIKuUCOG7w/exec" };
        const MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        let allRecords = [];

        const MemoryManager = {
            save(key, value) {
                if (!value) return;
                let data = JSON.parse(localStorage.getItem('me_sys_'+key) || '[]');
                data = [value, ...data.filter(i => i !== value)].slice(0, 30);
                localStorage.setItem('me_sys_'+key, JSON.stringify(data));
            },
            get(key) { return JSON.parse(localStorage.getItem('me_sys_'+key) || '[]'); },
            updateLists(records = []) {
                const hn = [...new Set([...this.get('hn'), ...records.map(r => String(r.hn))])].filter(Boolean);
                const drug = [...new Set([...this.get('drug'), ...records.map(r => String(r.drugname))])].filter(Boolean);
                const rep = [...new Set([...this.get('rep'), ...records.map(r => String(r.reporter))])].filter(Boolean);
                this.fill('hnList', hn); this.fill('drugList', drug); this.fill('reporterList', rep);
            },
            fill(id, items) {
                const el = document.getElementById(id); if(!el) return;
                el.innerHTML = items.map(i => `<option value="${i}">`).join('');
            }
        };

        function initFilterOptions() {
            const mOpts = `<option value="all">เลือกเดือน</option>` + MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            document.getElementById('startMonth').innerHTML = mOpts;
            document.getElementById('endMonth').innerHTML = mOpts;
            const curY = new Date().getFullYear();
            let yOpts = `<option value="all">เลือกปี</option>`;
            for (let y = curY - 2; y <= curY + 1; y++) yOpts += `<option value="${y}">พ.ศ. ${y + 543}</option>`;
            document.getElementById('startYear').innerHTML = yOpts;
            document.getElementById('endYear').innerHTML = yOpts;
        }

        async function fetchData() {
            try {
                document.getElementById('syncStatus').innerHTML = 'กำลังซิงค์...';
                const response = await fetch(CONFIG.scriptUrl);
                allRecords = await response.json();
                MemoryManager.updateLists(allRecords);
                render();
                document.getElementById('syncStatus').innerHTML = 'ข้อมูลล่าสุด';
            } catch (e) { document.getElementById('syncStatus').innerHTML = 'ผิดพลาด'; }
        }

        async function saveError() {
            const btn = document.getElementById('btnSubmit');
            const data = {
                id: Date.now(),
                eventDate: document.getElementById('eventDate').value,
                hn: document.getElementById('hn').value.trim(),
                process: document.getElementById('process').value,
                drugName: document.getElementById('drugName').value.trim(),
                details: document.getElementById('details').value.trim(),
                severity: document.getElementById('severity').value,
                reporter: document.getElementById('reporter').value.trim()
            };
            if (Object.values(data).some(v => !v)) return showAlert('กรุณากรอกข้อมูลให้ครบ', 'error');

            MemoryManager.save('hn', data.hn); MemoryManager.save('drug', data.drugName); MemoryManager.save('rep', data.reporter);
            localStorage.setItem('lastRep', data.reporter);

            btn.disabled = true; btn.innerText = 'บันทึก...';
            try {
                await fetch(CONFIG.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showAlert('สำเร็จ!', 'success'); resetForm(); fetchData();
            } catch (e) { showAlert('ลองอีกครั้ง', 'error'); } 
            finally { btn.disabled = false; btn.innerText = 'บันทึกรายงาน'; }
        }

        function render() {
            const sM = document.getElementById('startMonth').value;
            const sY = document.getElementById('startYear').value;
            const eM = document.getElementById('endMonth').value;
            const eY = document.getElementById('endYear').value;

            let filtered = [...allRecords];
            if (sM !== "all" && sY !== "all" && eM !== "all" && eY !== "all") {
                const start = new Date(sY, sM, 1);
                const end = new Date(eY, parseInt(eM) + 1, 0, 23, 59, 59);
                filtered = allRecords.filter(r => {
                    const d = new Date(r.eventDate);
                    return d >= start && d <= end;
                });
                document.getElementById('filterLabel').innerText = `ช่วงที่เลือก (${filtered.length})`;
            } else {
                document.getElementById('filterLabel').innerText = `ทั้งหมด (${allRecords.length})`;
            }

            updateDashboard(filtered);
            const list = document.getElementById('historyList');
            list.innerHTML = filtered.length ? '' : '<div class="text-center py-10 text-slate-400">ไม่พบข้อมูล</div>';
            filtered.sort((a,b) => b.id - a.id).forEach(r => {
                const div = document.createElement('div');
                div.className = `card p-5 animate-fade border-l-8 ${['A','B'].includes(r.severity)?'border-emerald-400':['C','D'].includes(r.severity)?'border-amber-400':'border-rose-400'}`;
                div.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <div><span class="text-[10px] text-slate-400">${new Date(r.eventDate).toLocaleDateString('th-TH')}</span><h3 class="text-sm font-bold">HN: ${r.hn} | ${r.drugname}</h3></div>
                        <span class="severity-badge ${['A','B'].includes(r.severity)?'bg-emerald-100 text-emerald-600':['C','D'].includes(r.severity)?'bg-amber-100 text-amber-600':'bg-rose-100 text-rose-600'}">${r.severity}</span>
                    </div>
                    <p class="text-[11px] text-indigo-500 font-bold">${r.Process || r.process}</p>
                    <p class="text-sm text-slate-600">${r.details}</p>
                `;
                list.appendChild(div);
            });
        }

        function updateDashboard(data) {
            const s = { total: data.length, ab: 0, cd: 0, ei: 0 };
            data.forEach(r => {
                if(['A','B'].includes(r.severity)) s.ab++;
                else if(['C','D'].includes(r.severity)) s.cd++;
                else s.ei++;
            });
            document.getElementById('statTotal').innerText = s.total;
            document.getElementById('statNearMiss').innerText = s.ab;
            document.getElementById('statError').innerText = s.cd;
            document.getElementById('statHarm').innerText = s.ei;
        }

        function resetFilters() {
            ['startMonth','startYear','endMonth','endYear'].forEach(id => document.getElementById(id).value = "all");
            render();
        }

        function resetForm() {
            const rep = document.getElementById('reporter').value;
            ['hn','process','drugName','details','severity'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('reporter').value = rep;
            document.getElementById('eventDate').valueAsDate = new Date();
        }

        function showAlert(m, t) {
            const d = document.createElement('div');
            d.className = `p-4 rounded-xl text-white text-center font-bold animate-fade ${t==='success'?'bg-emerald-500':'bg-rose-500'}`;
            d.innerText = m; document.getElementById('alertContainer').appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        window.onload = () => {
            initFilterOptions();
            document.getElementById('eventDate').valueAsDate = new Date();
            const last = localStorage.getItem('lastRep');
            if(last) document.getElementById('reporter').value = last;
            fetchData();
        };
    </script>
</body>
</html>
