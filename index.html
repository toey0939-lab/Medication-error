<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medication Error System - Med Male 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .severity-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        input:focus, select:focus, textarea:focus { border-color: #4f46e5; ring: 2px; ring-color: #4f46e5; outline: none; }
        optgroup { font-weight: bold; color: #4f46e5; background: #f8fafc; }
        option { padding: 10px; white-space: normal; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center">
                <i class="fa-solid fa-pills mr-2"></i>Med Male 1 - ME System
            </h1>
            <div id="syncStatus" class="text-slate-400 text-[10px] font-bold uppercase">
                <i class="fa-solid fa-circle-notch fa-spin mr-1"></i>ตรวจสอบข้อมูล...
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <!-- Form -->
        <div class="card p-6 md:p-8 space-y-6 border-t-4 border-t-indigo-500 shadow-xl">
            <h2 class="text-lg font-bold text-slate-700 flex items-center border-b pb-4">
                <i class="fa-solid fa-clipboard-list mr-2 text-indigo-500"></i>บันทึกรายงานอุบัติการณ์ความคลาดเคลื่อน
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">วันที่เกิดเหตุ *</label>
                    <input type="date" id="eventDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">เลข HN ผู้ป่วย *</label>
                    <input type="text" id="hn" list="hnList" placeholder="ระบุ HN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="hnList"></datalist>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ขั้นตอนที่เกิดความคลาดเคลื่อน *</label>
                    <select id="process" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        <option value="">-- เลือกขั้นตอนที่เกิดปัญหา --</option>
                        <option value="Prescribing">Prescribing : สั่งยา (เช่น แพทย์สั่งยาผิดขนาด/ผิดชนิด)</option>
                        <option value="Transcribing">Transcribing : คัดลอก (เช่น พยาบาลลงบันทึกยาไม่ตรงกับคำสั่งแพทย์)</option>
                        <option value="Dispensing">Dispensing : จัด/จ่ายยา (เช่น ห้องยาจัดยาผิด หรือจัดยา LASA มาให้)</option>
                        <option value="Administration">Administration : บริหารยา (เช่น ให้ยาผิดคน ผิดเวลา หรือผิดเทคนิค)</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ชื่อยาที่มีปัญหา *</label>
                    <input type="text" id="drugName" list="drugList" placeholder="พิมพ์ชื่อยา (ระบบจะจำชื่อที่เคยพิมพ์)" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="drugList"></datalist>
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ระดับความรุนแรง (A-I) *</label>
                <select id="severity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <option value="">-- เลือกระดับความรุนแรง --</option>
                    <optgroup label="Near Miss (ยังไม่ถึงตัวผู้ป่วย)">
                        <option value="A">ระดับ A : มีโอกาสเกิดแต่ยังไม่เกิด (เช่น พบยา LASA วางปนกันแต่ยังไม่มีการสั่ง)</option>
                        <option value="B">ระดับ B : เกิดความผิดพลาดแต่หยุดทัน (เช่น ห้องยาจัดยาผิดแต่พยาบาลทักท้วงทันก่อนถึงวอร์ด)</option>
                    </optgroup>
                    <optgroup label="No Harm (ถึงตัวผู้ป่วยแต่ไม่เกิดอันตราย)">
                        <option value="C">ระดับ C : ถึงตัวผู้ป่วยแต่ไม่เกิดอันตราย (เช่น ให้ยาผิดมื้อแต่ผู้ป่วยไม่มีอาการผิดปกติ)</option>
                        <option value="D">ระดับ D : ถึงตัวผู้ป่วย ต้องเฝ้าระวังเพิ่ม (เช่น ให้ยาผิดตัว ต้องเจาะเลือดติดตามผลแต่ไม่เกิดอันตราย)</option>
                    </optgroup>
                    <optgroup label="Harm (เกิดอันตรายต่อผู้ป่วย)">
                        <option value="E">ระดับ E : อันตรายชั่วคราว ต้องรักษาเพิ่ม (เช่น ให้ยาเกินขนาดจนความดันตก ต้องให้สารน้ำช่วย)</option>
                        <option value="F">ระดับ F : อันตรายชั่วคราว ต้องอยู่ รพ. นานขึ้น (เช่น แพ้ยาจนต้องนอนสังเกตอาการเพิ่มอีก 2 วัน)</option>
                        <option value="G">ระดับ G : อันตรายถาวร (เช่น ให้ยาผิดจนผู้ป่วยเกิดภาวะพิการหรือสูญเสียหน้าที่อวัยวะ)</option>
                        <option value="H">ระดับ H : เกือบเสียชีวิต (เช่น เกิดภาวะหัวใจหยุดเต้นจากการให้ยาผิด ต้องกู้ชีพ CPR)</option>
                        <option value="I">ระดับ I : เสียชีวิต (เช่น พยาบาลบริหารยา KCL โดยการ IV push ทำให้ผู้ป่วยเสียชีวิต)</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">รายละเอียดเหตุการณ์ *</label>
                <textarea id="details" rows="3" placeholder="ระบุรายละเอียดเหตุการณ์..." class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50"></textarea>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ผู้รายงาน *</label>
                <input type="text" id="reporter" list="reporterList" placeholder="ระบุชื่อผู้รายงาน" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                <datalist id="reporterList"></datalist>
            </div>

            <button onclick="saveError()" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงานลงระบบ
            </button>
        </div>

        <!-- Dashboard -->
        <div class="space-y-3">
            <div class="flex justify-between items-end px-1">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">สรุปภาพรวมทั้งหมด</h2>
                <span id="currentFilterText" class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">เรียลไทม์จาก Google Sheets</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="card p-4 text-center"><p class="text-[10px] text-slate-400 font-bold">รวม</p><p id="statTotal" class="text-2xl font-bold text-indigo-600">-</p></div>
                <div class="card p-4 text-center bg-emerald-50 border-emerald-100"><p class="text-[10px] text-emerald-600 font-bold">A-B</p><p id="statNearMiss" class="text-2xl font-bold text-emerald-700">-</p></div>
                <div class="card p-4 text-center bg-amber-50 border-amber-100"><p class="text-[10px] text-amber-600 font-bold">C-D</p><p id="statError" class="text-2xl font-bold text-amber-700">-</p></div>
                <div class="card p-4 text-center bg-rose-50 border-rose-100"><p class="text-[10px] text-rose-600 font-bold">E-I</p><p id="statHarm" class="text-2xl font-bold text-rose-700">-</p></div>
            </div>
        </div>

        <div id="historyList" class="space-y-4"></div>
    </main>

    <div id="alertContainer" class="fixed top-5 left-4 right-4 z-[110] flex flex-col space-y-2 pointer-events-none"></div>

    <script>
        const CONFIG = {
            scriptUrl: "https://script.google.com/macros/s/AKfycbymRwhneDoq2c7spuZVQ9MWB1Nv7igtnMEpi_jrL-Em0nXzE4_a5n22ecAYIIKuUCOG7w/exec"
        };
        let allRecords = [];

        const MemoryManager = {
            save(key, value) {
                if (!value || value.trim() === "") return;
                let storageKey = 'me_sys_' + key;
                let data = JSON.parse(localStorage.getItem(storageKey) || '[]');
                data = data.filter(item => item !== value);
                data.unshift(value); 
                if (data.length > 50) data.pop();
                localStorage.setItem(storageKey, JSON.stringify(data));
            },
            get(key) {
                return JSON.parse(localStorage.getItem('me_sys_' + key) || '[]');
            },
            updateAllLists(records = []) {
                const localHn = this.get('hn');
                const localDrug = this.get('drug');
                const localReporter = this.get('reporter');

                const dbHn = records.map(r => String(r.hn)).filter(Boolean);
                const dbDrug = records.map(r => String(r.drugname)).filter(Boolean);
                const dbReporter = records.map(r => String(r.reporter)).filter(Boolean);

                this.fillDatalist('hnList', [...new Set([...localHn, ...dbHn])]);
                this.fillDatalist('drugList', [...new Set([...localDrug, ...dbDrug])]);
                this.fillDatalist('reporterList', [...new Set([...localReporter, ...dbReporter])]);
            },
            fillDatalist(id, items) {
                const list = document.getElementById(id);
                if (!list) return;
                list.innerHTML = '';
                items.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    list.appendChild(opt);
                });
            }
        };

        async function fetchData() {
            if (!CONFIG.scriptUrl) return;
            try {
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-1"></i>ซิงค์ข้อมูล...';
                const response = await fetch(CONFIG.scriptUrl);
                allRecords = await response.json();
                MemoryManager.updateAllLists(allRecords);
                render();
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-check-circle mr-1 text-emerald-500"></i>Sheets ล่าสุด';
            } catch (e) {
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1 text-rose-500"></i>ออฟไลน์';
            }
        }

        async function saveError() {
            const btn = document.getElementById('btnSubmit');
            const data = {
                id: Date.now(),
                eventDate: document.getElementById('eventDate').value,
                hn: document.getElementById('hn').value.trim(),
                Process: document.getElementById('process').value,
                drugname: document.getElementById('drugName').value.trim(),
                details: document.getElementById('details').value.trim(),
                severity: document.getElementById('severity').value,
                reporter: document.getElementById('reporter').value.trim()
            };

            if (Object.values(data).some(v => !v)) return showAlert('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error');

            MemoryManager.save('hn', data.hn);
            MemoryManager.save('drug', data.drugname);
            MemoryManager.save('reporter', data.reporter);
            localStorage.setItem('lastReporter', data.reporter);

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>กำลังส่งข้อมูล...';

            try {
                await fetch(CONFIG.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showAlert('บันทึกลง Google Sheets เรียบร้อย!', 'success');
                resetForm();
                MemoryManager.updateAllLists(allRecords);
                setTimeout(fetchData, 2000);
            } catch (e) {
                showAlert('เกิดข้อผิดพลาดในการบันทึก', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงานลงระบบ';
            }
        }

        function render() {
            const list = document.getElementById('historyList');
            let stats = { total: allRecords.length, ab: 0, cd: 0, ei: 0 };
            
            list.innerHTML = allRecords.length ? '' : '<div class="text-center py-10 text-slate-400">ยังไม่มีข้อมูลในระบบ</div>';
            
            allRecords.sort((a,b) => b.id - a.id).forEach(r => {
                if (['A', 'B'].includes(r.severity)) stats.ab++;
                else if (['C', 'D'].includes(r.severity)) stats.cd++;
                else stats.ei++;

                const card = document.createElement('div');
                card.className = `card p-5 animate-fade border-l-8 ${getSevColor(r.severity)}`;
                card.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <div>
                            <span class="text-[10px] text-slate-400">${new Date(r.eventDate).toLocaleDateString('th-TH')}</span>
                            <h3 class="text-sm font-bold">HN: ${r.hn} | ${r.drugname}</h3>
                        </div>
                        <span class="severity-badge ${getSevBadge(r.severity)}">${r.severity}</span>
                    </div>
                    <p class="text-[11px] text-indigo-600 font-bold mb-1">${r.Process}</p>
                    <p class="text-sm text-slate-600">${r.details}</p>
                    <div class="mt-2 text-[9px] text-slate-400 flex justify-between">
                        <span>ผู้รายงาน: ${r.reporter}</span>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('statTotal').innerText = stats.total;
            document.getElementById('statNearMiss').innerText = stats.ab;
            document.getElementById('statError').innerText = stats.cd;
            document.getElementById('statHarm').innerText = stats.ei;
        }

        function getSevColor(s) { return ['A', 'B'].includes(s) ? 'border-emerald-400' : ['C', 'D'].includes(s) ? 'border-amber-400' : 'border-rose-400'; }
        function getSevBadge(s) { return ['A', 'B'].includes(s) ? 'bg-emerald-100 text-emerald-600' : ['C', 'D'].includes(s) ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'; }

        function resetForm() {
            const reporter = document.getElementById('reporter').value;
            ['hn', 'process', 'drugName', 'details', 'severity'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = '';
            });
            document.getElementById('reporter').value = reporter;
            document.getElementById('eventDate').valueAsDate = new Date();
        }

        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl text-white text-center font-bold text-sm shadow-xl animate-fade ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            div.innerText = msg;
            document.getElementById('alertContainer').appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        window.onload = () => {
            document.getElementById('eventDate').valueAsDate = new Date();
            const lastRep = localStorage.getItem('lastReporter');
            if (lastRep) document.getElementById('reporter').value = lastRep;
            MemoryManager.updateAllLists();
            fetchData();
        };
    </script>
</body>
</html>
