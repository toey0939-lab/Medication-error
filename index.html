<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medication Error System - Med Male 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .severity-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        input:focus, select:focus, textarea:focus { border-color: #4f46e5; ring: 2px; ring-color: #4f46e5; outline: none; }
        optgroup { font-weight: bold; color: #4f46e5; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center">
                <i class="fa-solid fa-pills mr-2"></i>Med Male 1 - ME System
            </h1>
            <div id="syncStatus" class="text-slate-400 text-[10px] font-bold uppercase">
                <i class="fa-solid fa-circle-notch fa-spin mr-1"></i>ตรวจสอบข้อมูล...
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <!-- 1. บันทึกรายงานอุบัติการณ์ความคลาดเคลื่อนของยา (บนสุด) -->
        <div class="card p-6 md:p-8 space-y-6 border-t-4 border-t-indigo-500 shadow-xl">
            <h2 class="text-lg font-bold text-slate-700 flex items-center border-b pb-4">
                <i class="fa-solid fa-clipboard-list mr-2 text-indigo-500"></i>บันทึกรายงานอุบัติการณ์ความคลาดเคลื่อนของยา
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">วันที่เกิดเหตุ *</label>
                    <input type="date" id="eventDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">เลข HN ผู้ป่วย *</label>
                    <input type="text" id="hn" placeholder="ระบุ HN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ขั้นตอนที่เกิดความคลาดเคลื่อน *</label>
                    <select id="process" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        <option value="">-- เลือกขั้นตอนที่เกิดปัญหา --</option>
                        <option value="Prescribing">Prescribing: แพทย์สั่งยา</option>
                        <option value="Transcribing">Transcribing: การคัดลอก/คีย์คำสั่ง</option>
                        <option value="Dispensing">Dispensing: การจัดยา/จ่ายยา</option>
                        <option value="Administration">Administration: การบริหารยา</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ชื่อยาที่มีปัญหา *</label>
                    <input type="text" id="drugName" list="drugList" placeholder="พิมพ์ชื่อยา..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="drugList"></datalist>
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ระดับความรุนแรง (A-I) *</label>
                <select id="severity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <option value="">-- เลือกระดับความรุนแรง --</option>
                    <optgroup label="Near Miss (เกือบพลาด)">
                        <option value="A">ระดับ A: มีโอกาสเกิดผิดพลาด</option>
                        <option value="B">ระดับ B: เกิดความผิดพลาดแต่หยุดทัน</option>
                    </optgroup>
                    <optgroup label="No Harm (ถึงตัวแต่ไม่บาดเจ็บ)">
                        <option value="C">ระดับ C: ถึงตัวแต่ไม่บาดเจ็บ</option>
                        <option value="D">ระดับ D: ถึงตัว ต้องเฝ้าระวังเพิ่ม</option>
                    </optgroup>
                    <optgroup label="Harm (เกิดอันตราย)">
                        <option value="E">ระดับ E: อันตรายชั่วคราว รักษาเพิ่ม</option>
                        <option value="F">ระดับ F: อันตรายชั่วคราว นอนนานขึ้น</option>
                        <option value="G">ระดับ G: อันตรายถาวร/พิการ</option>
                        <option value="H">ระดับ H: เกือบเสียชีวิต</option>
                        <option value="I">ระดับ I: เสียชีวิต</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">รายละเอียดเหตุการณ์ *</label>
                <textarea id="details" rows="3" placeholder="ระบุเหตุการณ์..." class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50"></textarea>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ผู้รายงาน *</label>
                <input type="text" id="reporter" placeholder="ระบุชื่อผู้บันทึก" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
            </div>

            <button onclick="saveError()" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงานลงระบบ
            </button>
        </div>

        <!-- 2. Dash board (กลาง) -->
        <div class="space-y-3">
            <div class="flex justify-between items-end px-1">
                <h2 id="statsLabel" class="text-xs font-bold text-slate-500 uppercase tracking-widest">สรุปภาพรวมทั้งหมด</h2>
                <span id="currentFilterText" class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">ดูข้อมูลทั้งหมด</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="card p-4 text-center bg-white border-slate-100">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Total</p>
                    <p id="statTotal" class="text-2xl font-bold text-indigo-600">-</p>
                </div>
                <div class="card p-4 text-center bg-emerald-50 border-emerald-100">
                    <p class="text-[10px] text-emerald-600 uppercase font-bold">Near Miss (A-B)</p>
                    <p id="statNearMiss" class="text-2xl font-bold text-emerald-700">-</p>
                </div>
                <div class="card p-4 text-center bg-amber-50 border-amber-100">
                    <p class="text-[10px] text-amber-600 uppercase font-bold">No Harm (C-D)</p>
                    <p id="statError" class="text-2xl font-bold text-amber-700">-</p>
                </div>
                <div class="card p-4 text-center bg-rose-50 border-rose-100">
                    <p class="text-[10px] text-rose-600 uppercase font-bold">Harm (E-I)</p>
                    <p id="statHarm" class="text-2xl font-bold text-rose-700">-</p>
                </div>
            </div>
        </div>

        <!-- 3. ตัวกรอง (ต่อมา) -->
        <div class="card p-5 space-y-4 border-l-4 border-l-indigo-400">
            <div class="flex items-center justify-between">
                <h3 class="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center">
                    <i class="fa-solid fa-calendar-range mr-2"></i>ตัวกรองช่วงเวลา (Range Filter)
                </h3>
                <button onclick="resetFilters()" class="text-[10px] text-indigo-500 font-bold hover:underline">แสดงข้อมูลทั้งหมด</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">ตั้งแต่เดือน/ปี</label>
                    <div class="flex space-x-1">
                        <select id="startMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 font-bold bg-slate-50"></select>
                        <select id="startYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 font-bold bg-slate-50"></select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">ถึงเดือน/ปี</label>
                    <div class="flex space-x-1">
                        <select id="endMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 font-bold bg-slate-50"></select>
                        <select id="endYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 font-bold bg-slate-50"></select>
                    </div>
                </div>
            </div>
            <div id="filterStatus" class="hidden text-[10px] text-indigo-600 font-bold bg-indigo-50 p-2 rounded-lg text-center animate-fade">
                <i class="fa-solid fa-info-circle mr-1"></i>กำลังแสดงข้อมูลแบบกำหนดช่วงเวลา
            </div>
        </div>

        <!-- 4. เหตุการณ์ที่ลงรายงาน (ปิดท้าย) -->
        <div class="space-y-4">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">ประวัติรายงานอุบัติการณ์</h3>
            <div id="historyList" class="space-y-4"></div>
        </div>

    </main>

    <div id="alertContainer" class="fixed top-5 left-4 right-4 z-[110] flex flex-col space-y-2 pointer-events-none"></div>

    <script>
        const CONFIG = {
            scriptUrl: "https://script.google.com/macros/s/AKfycbymRwhneDoq2c7spuZVQ9MWB1Nv7igtnMEpi_jrL-Em0nXzE4_a5n22ecAYIIKuUCOG7w/exec" // วาง Web App URL จาก Google Apps Script
        };

        const MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        let allRecords = [];
        let isInitialLoad = true;

        async function fetchData() {
            if (!CONFIG.scriptUrl) {
                document.getElementById('historyList').innerHTML = '<div class="card p-10 text-center text-slate-400">กรุณาตั้งค่า Script URL เพื่อเชื่อมต่อฐานข้อมูล</div>';
                return;
            }
            try {
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-1"></i>กำลังซิงค์...';
                const response = await fetch(CONFIG.scriptUrl);
                allRecords = await response.json();
                
                updateDrugSuggestions();
                initFilterOptions();
                render();
                
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-check-circle mr-1 text-emerald-500"></i>ข้อมูลล่าสุด';
            } catch (e) {
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-exclamation-triangle mr-1 text-rose-500"></i>การเชื่อมต่อผิดพลาด';
            }
        }

        function initFilterOptions() {
            const startM = document.getElementById('startMonth');
            const endM = document.getElementById('endMonth');
            const startY = document.getElementById('startYear');
            const endY = document.getElementById('endYear');

            const monthOptions = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            startM.innerHTML = `<option value="all">เลือกเดือน</option>` + monthOptions;
            endM.innerHTML = `<option value="all">เลือกเดือน</option>` + monthOptions;

            const currentYear = new Date().getFullYear();
            let years = [...new Set(allRecords.map(r => new Date(r.eventDate).getFullYear()))].filter(y => !isNaN(y));
            if (years.length === 0) years = [currentYear];
            
            const minYear = Math.min(...years, currentYear - 5);
            const maxYear = Math.max(...years, currentYear + 1);
            
            let yearOptions = '<option value="all">เลือกปี</option>';
            for (let y = minYear; y <= maxYear; y++) {
                yearOptions += `<option value="${y}">พ.ศ. ${y + 543}</option>`;
            }
            startY.innerHTML = yearOptions;
            endY.innerHTML = yearOptions;

            if(isInitialLoad) {
                startM.value = "all";
                startY.value = "all";
                endM.value = "all";
                endY.value = "all";
                isInitialLoad = false;
            }
        }

        function resetFilters() {
            document.getElementById('startMonth').value = "all";
            document.getElementById('startYear').value = "all";
            document.getElementById('endMonth').value = "all";
            document.getElementById('endYear').value = "all";
            render();
        }

        function render() {
            const list = document.getElementById('historyList');
            const statsLabel = document.getElementById('statsLabel');
            const filterText = document.getElementById('currentFilterText');
            const filterStatusBox = document.getElementById('filterStatus');
            
            const sM = document.getElementById('startMonth').value;
            const sY = document.getElementById('startYear').value;
            const eM = document.getElementById('endMonth').value;
            const eY = document.getElementById('endYear').value;

            let filtered = [...allRecords];
            const isFiltering = (sM !== "all" && sY !== "all" && eM !== "all" && eY !== "all");

            if (isFiltering) {
                const startDate = new Date(parseInt(sY), parseInt(sM), 1);
                const endDate = new Date(parseInt(eY), parseInt(eM) + 1, 0, 23, 59, 59);
                filtered = allRecords.filter(r => {
                    const rDate = new Date(r.eventDate);
                    return rDate >= startDate && rDate <= endDate;
                });
                statsLabel.innerText = "สรุปสถิติตามช่วงเวลาที่เลือก";
                filterText.innerText = "กำลังกรองข้อมูล";
                filterText.className = "text-[10px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-full";
                filterStatusBox.classList.remove('hidden');
            } else {
                statsLabel.innerText = "สรุปภาพรวมทั้งหมด";
                filterText.innerText = "ดูข้อมูลทั้งหมด";
                filterText.className = "text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full";
                filterStatusBox.classList.add('hidden');
            }

            updateDashboard(filtered);

            list.innerHTML = '';
            if (filtered.length === 0) {
                list.innerHTML = '<div class="text-center py-20 text-slate-400 italic text-sm animate-fade">ไม่พบข้อมูล</div>';
                return;
            }

            filtered.sort((a,b) => b.id - a.id).forEach(r => {
                const card = document.createElement('div');
                card.className = `card p-5 animate-fade border-l-8 ${getSevColor(r.severity)}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400">${new Date(r.eventDate).toLocaleDateString('th-TH')}</span>
                            <h3 class="text-sm font-bold text-indigo-900">HN: ${r.hn} | ${r.drugName}</h3>
                        </div>
                        <span class="severity-badge ${getSevBadge(r.severity)}">LEVEL ${r.severity}</span>
                    </div>
                    <div class="space-y-1">
                        <div class="text-[10px] font-bold text-indigo-500 uppercase italic flex items-center">
                            <i class="fa-solid fa-circle-exclamation mr-1"></i>${r.process}
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed">${r.details}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center text-[10px] text-slate-400">
                        <span>ผู้รายงาน: ${r.reporter}</span>
                        <i class="fa-solid fa-id-card-clip"></i>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function updateDashboard(data) {
            let stats = { total: data.length, ab: 0, cd: 0, ei: 0 };
            data.forEach(r => {
                const s = r.severity;
                if (['A', 'B'].includes(s)) stats.ab++;
                else if (['C', 'D'].includes(s)) stats.cd++;
                else if (['E', 'F', 'G', 'H', 'I'].includes(s)) stats.ei++;
            });

            document.getElementById('statTotal').innerText = stats.total;
            document.getElementById('statNearMiss').innerText = stats.ab;
            document.getElementById('statError').innerText = stats.cd;
            document.getElementById('statHarm').innerText = stats.ei;
            
            ['statTotal', 'statNearMiss', 'statError', 'statHarm'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('animate-fade');
                void el.offsetWidth;
                el.classList.add('animate-fade');
            });
        }

        function updateDrugSuggestions() {
            const list = document.getElementById('drugList');
            const drugs = [...new Set(allRecords.map(r => r.drugName))].filter(Boolean);
            list.innerHTML = '';
            drugs.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                list.appendChild(opt);
            });
        }

        async function saveError() {
            const data = {
                id: Date.now(),
                eventDate: document.getElementById('eventDate').value,
                hn: document.getElementById('hn').value.trim(),
                process: document.getElementById('process').value,
                drugName: document.getElementById('drugName').value.trim(),
                details: document.getElementById('details').value.trim(),
                severity: document.getElementById('severity').value,
                reporter: document.getElementById('reporter').value.trim()
            };

            if (Object.values(data).some(v => !v)) return showAlert('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error');

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>กำลังบันทึก...';

            try {
                await fetch(CONFIG.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showAlert('บันทึกสำเร็จ!', 'success');
                resetForm();
                setTimeout(fetchData, 1500);
            } catch (e) {
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงานลงระบบ';
            }
        }

        function getSevColor(s) {
            if (['A', 'B'].includes(s)) return 'border-emerald-400';
            if (['C', 'D'].includes(s)) return 'border-amber-400';
            return 'border-rose-400';
        }

        function getSevBadge(s) {
            if (['A', 'B'].includes(s)) return 'bg-emerald-100 text-emerald-600';
            if (['C', 'D'].includes(s)) return 'bg-amber-100 text-amber-600';
            return 'bg-rose-100 text-rose-600';
        }

        function resetForm() {
            ['hn', 'process', 'drugName', 'details', 'severity', 'reporter'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('eventDate').valueAsDate = new Date();
        }

        function showAlert(msg, type) {
            const container = document.getElementById('alertContainer');
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl shadow-xl text-white text-center font-bold text-sm animate-fade ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            div.innerText = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        window.onload = () => {
            document.getElementById('eventDate').valueAsDate = new Date();
            fetchData();
        };
    </script>
</body>
</html>
