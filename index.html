<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medication Error System - Med Male 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .severity-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        input:focus, select:focus, textarea:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        #adminModal { display: none; }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease-out; }
        
        .status-pill { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 9999px; display: inline-flex; align-items: center; }
        .status-done { background-color: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .status-pending { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center">
                <i class="fa-solid fa-pills mr-2"></i>Med Male 1 - ME System
            </h1>
            <div class="flex items-center space-x-3">
                <button onclick="toggleAdmin()" id="adminLockBtn" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:text-indigo-600 transition-all">
                    <i class="fa-solid fa-user-shield text-xs"></i>
                </button>
                <div id="syncStatus" class="text-slate-400 text-[10px] font-bold uppercase">
                    <i class="fa-solid fa-circle-notch fa-spin mr-1"></i>ตรวจสอบข้อมูล...
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        
        <!-- Form บันทึกรายงาน -->
        <div class="card p-6 md:p-8 space-y-6 border-t-4 border-t-indigo-500 shadow-xl">
            <h2 class="text-lg font-bold text-slate-700 flex items-center border-b pb-4">
                <i class="fa-solid fa-clipboard-list mr-2 text-indigo-500"></i>บันทึกรายงานอุบัติการณ์
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">วันที่เกิดเหตุ *</label>
                    <input type="date" id="eventDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">เลข HN ผู้ป่วย *</label>
                    <input type="text" id="hn" list="hnList" placeholder="ระบุ HN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="hnList"></datalist>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ขั้นตอนที่เกิดความคลาดเคลื่อน *</label>
                    <select id="process" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        <option value="">-- เลือกขั้นตอนที่เกิดปัญหา --</option>
                        <option value="Prescribing">Prescribing : สั่งยา (เช่น แพทย์สั่งยาผิดขนาด/ผิดชนิด)</option>
                        <option value="Transcribing">Transcribing : คัดลอก (เช่น พยาบาลคีย์ยาไม่ตรงคำสั่งแพทย์)</option>
                        <option value="Dispensing">Dispensing : จัด/จ่ายยา (เช่น ห้องยาจัดยาผิด หรือจัดยา LASA มาให้)</option>
                        <option value="Administration">Administration : บริหารยา (เช่น ให้ยาผิดคน ผิดเวลา ผิดเทคนิค)</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ชื่อยาที่มีปัญหา *</label>
                    <input type="text" id="drugName" list="drugList" placeholder="พิมพ์ชื่อยา..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <datalist id="drugList"></datalist>
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ระดับความรุนแรง (Severity) *</label>
                <select id="severity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    <option value="">-- เลือกระดับความรุนแรง --</option>
                    <optgroup label="Near Miss (เหตุการณ์ที่เกือบจะเกิดอันตราย)">
                        <option value="A">ระดับ A : มีโอกาสเกิด (เช่น พบยา LASA วางปนกันแต่ยังไม่มีการสั่งยา)</option>
                        <option value="B">ระดับ B : เกิดผิดพลาดแต่หยุดทัน (เช่น ห้องยาจัดยาผิดแต่พยาบาลทักท้วงทันก่อนฉีด)</option>
                    </optgroup>
                    <optgroup label="No Harm (เกิดความคลาดเคลื่อนแต่ไม่เป็นอันตราย)">
                        <option value="C">ระดับ C : ถึงตัวผู้ป่วยแต่ไม่เกิดอันตราย (เช่น ให้ยาผิดมื้อแต่ผู้ป่วยปกติ)</option>
                        <option value="D">ระดับ D : ถึงตัวผู้ป่วย ต้องเฝ้าระวังเพิ่ม (เช่น ให้ยาผิดตัว ต้องเจาะเลือดติดตามผล)</option>
                    </optgroup>
                    <optgroup label="Harm (เกิดอันตรายต่อผู้ป่วย)">
                        <option value="E">ระดับ E : อันตรายชั่วคราว ต้องรักษาเพิ่ม (เช่น ความดันตกจากการให้ยาเกิน ต้องให้สารน้ำ)</option>
                        <option value="F">ระดับ F : อันตรายชั่วคราว ต้องนอน รพ. นานขึ้น (เช่น แพ้ยาจนต้องอยู่ดูอาการเพิ่ม)</option>
                        <option value="G">ระดับ G : อันตรายถาวร (เช่น พิการหรือสูญเสียหน้าที่อวัยวะจากการให้ยาผิด)</option>
                        <option value="H">ระดับ H : เกือบเสียชีวิต (เช่น หัวใจหยุดเต้นจากการให้ยาผิด ต้องกู้ชีพ CPR)</option>
                        <option value="I">ระดับ I : เสียชีวิต (เช่น บริหารยา High Alert Drug ผิดพลาดรุนแรง)</option>
                    </optgroup>
                </select>
            </div>

            <textarea id="details" rows="3" placeholder="ระบุรายละเอียดเหตุการณ์เพิ่มเติม..." class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50"></textarea>
            
            <div>
                <label class="block text-[11px] text-slate-500 mb-1 ml-1 font-bold">ผู้รายงาน *</label>
                <input type="text" id="reporter" list="reporterList" placeholder="ชื่อผู้รายงาน" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                <datalist id="reporterList"></datalist>
            </div>

            <button onclick="saveError()" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>บันทึกรายงาน
            </button>
        </div>

        <!-- Dashboard & Filter -->
        <div class="card p-5 space-y-4 border-l-4 border-l-indigo-400">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center">
                    <i class="fa-solid fa-filter mr-2"></i>Dashboard Filter
                </h3>
                <button id="pendingHrmsBtn" onclick="togglePendingFilter()" class="text-[10px] font-bold px-3 py-1.5 rounded-full border border-rose-200 text-rose-500 bg-rose-50 hover:bg-rose-100 transition-all">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i>ดูเฉพาะค้างลง HRMS
                </button>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold ml-1">เริ่ม</span>
                    <div class="flex space-x-1">
                        <select id="startMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                        <select id="startYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                    </div>
                </div>
                <div class="space-y-1">
                    <span class="text-[10px] text-slate-400 font-bold ml-1">สิ้นสุด</span>
                    <div class="flex space-x-1">
                        <select id="endMonth" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                        <select id="endYear" onchange="render()" class="w-full text-xs border rounded-lg p-2 bg-slate-50"></select>
                    </div>
                </div>
            </div>
            <button onclick="resetFilters()" class="text-[10px] text-indigo-500 font-bold underline">ล้างตัวกรองทั้งหมด</button>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="card p-4 text-center"><p class="text-[10px] text-slate-400 font-bold">รวม</p><p id="statTotal" class="text-2xl font-bold text-indigo-600">-</p></div>
            <div class="card p-4 text-center bg-emerald-50"><p class="text-[10px] text-emerald-600 font-bold">Near Miss (A-B)</p><p id="statNearMiss" class="text-2xl font-bold text-emerald-700">-</p></div>
            <div class="card p-4 text-center bg-amber-50"><p class="text-[10px] text-amber-600 font-bold">Error (C-D)</p><p id="statError" class="text-2xl font-bold text-amber-700">-</p></div>
            <div class="card p-4 text-center bg-rose-50"><p class="text-[10px] text-rose-600 font-bold">ค้างลง HRMS</p><p id="statPending" class="text-2xl font-bold text-rose-700">-</p></div>
        </div>

        <div id="historyList" class="space-y-4"></div>
    </main>

    <!-- Admin Modal -->
    <div id="adminModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl space-y-6">
            <div class="text-center">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-lock text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">Admin Login</h3>
                <p class="text-sm text-slate-500">ใส่รหัสผ่านเพื่อจัดการสถานะ HRMS</p>
            </div>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน" class="w-full px-5 py-3 rounded-xl border border-slate-200 text-center text-lg tracking-widest">
            <div class="flex space-x-3">
                <button onclick="closeAdmin()" class="flex-1 py-3 text-slate-400 font-bold text-sm">ยกเลิก</button>
                <button onclick="verifyAdmin()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg transition-transform active:scale-95">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="alertContainer" class="fixed top-5 left-4 right-4 z-[300] flex flex-col space-y-2 pointer-events-none"></div>

    <script>
        const CONFIG = { 
            scriptUrl: "https://script.google.com/macros/s/AKfycbx21yaunzNCkzw-5DmnIPolXd9XPsUfRcJeWAQFfd49-ZmzV6NmEJqriOhENXnp-R8QEg/exec",
            adminPass: "med1234"
        };
        const MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        let allRecords = [];
        let isAdmin = false;
        let isPendingOnly = false;

        function updateDataLists() {
            const hns = new Set();
            const drugs = new Set();
            const reporters = new Set();
            allRecords.forEach(r => {
                if (r.hn) hns.add(r.hn);
                const dName = r.drugName || r.drugname;
                if (dName) drugs.add(dName);
                if (r.reporter) reporters.add(r.reporter);
            });
            const renderList = (id, data) => {
                const el = document.getElementById(id);
                el.innerHTML = Array.from(data).map(item => `<option value="${item}">`).join('');
            };
            renderList('hnList', hns);
            renderList('drugList', drugs);
            renderList('reporterList', reporters);
        }

        async function fetchData() {
            try {
                document.getElementById('syncStatus').innerHTML = '<i class="fa-solid fa-sync fa-spin"></i>';
                const res = await fetch(CONFIG.scriptUrl);
                allRecords = await res.json();
                updateDataLists();
                render();
                document.getElementById('syncStatus').innerHTML = 'ออนไลน์';
            } catch (e) { document.getElementById('syncStatus').innerHTML = 'ออฟไลน์'; }
        }

        async function saveError() {
            const btn = document.getElementById('btnSubmit');
            const data = {
                id: Date.now(),
                eventDate: document.getElementById('eventDate').value,
                hn: document.getElementById('hn').value.trim(),
                process: document.getElementById('process').value,
                drugName: document.getElementById('drugName').value.trim(),
                details: document.getElementById('details').value.trim(),
                severity: document.getElementById('severity').value,
                reporter: document.getElementById('reporter').value.trim(),
                hrmsStatus: "FALSE" // เริ่มต้นเป็น FALSE สำหรับ Checkbox ใน Sheet
            };

            if (Object.values(data).some(v => v === "")) return showAlert('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');

            btn.disabled = true; btn.innerText = 'กำลังส่งข้อมูล...';
            try {
                await fetch(CONFIG.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showAlert('ส่งรายงานสำเร็จ!', 'success'); 
                resetForm(); 
                fetchData();
            } catch (e) { showAlert('ส่งข้อมูลล้มเหลว', 'error'); } 
            finally { btn.disabled = false; btn.innerText = 'บันทึกรายงาน'; }
        }

        function render() {
            const list = document.getElementById('historyList');
            let filtered = [...allRecords];

            const sM = document.getElementById('startMonth').value;
            const sY = document.getElementById('startYear').value;
            const eM = document.getElementById('endMonth').value;
            const eY = document.getElementById('endYear').value;
            
            if (sM !== "all" && sY !== "all") {
                const start = new Date(sY, sM, 1);
                const end = new Date(eY, parseInt(eM) + 1, 0, 23, 59, 59);
                filtered = filtered.filter(r => { 
                    const d = new Date(r.eventDate); 
                    return d >= start && d <= end; 
                });
            }

            if (isPendingOnly) filtered = filtered.filter(r => r.hrmsStatus !== 'TRUE' && r.hrmsStatus !== true);

            updateStats(filtered);
            list.innerHTML = filtered.length ? '' : '<div class="text-center py-12 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-300">ไม่พบประวัติข้อมูล</div>';
            
            filtered.sort((a,b) => b.id - a.id).forEach(r => {
                // ตรวจสอบทั้งกรณีสตริง 'TRUE' หรือบูลีน true จาก API
                const isDone = r.hrmsStatus === 'TRUE' || r.hrmsStatus === true;
                const div = document.createElement('div');
                div.className = `card p-5 animate-fade border-l-8 ${['A','B'].includes(r.severity)?'border-emerald-400':['C','D'].includes(r.severity)?'border-amber-400':'border-rose-400'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold mb-0.5">${new Date(r.eventDate).toLocaleDateString('th-TH')}</div>
                            <h3 class="text-sm font-bold text-slate-800">HN: ${r.hn} | ${r.drugName || r.drugname}</h3>
                        </div>
                        <div class="flex flex-col items-end space-y-1.5">
                            <span class="severity-badge ${['A','B'].includes(r.severity)?'bg-emerald-100 text-emerald-600':['C','D'].includes(r.severity)?'bg-amber-100 text-amber-600':'bg-rose-100 text-rose-600'}">ระดับ ${r.severity}</span>
                            <span class="status-pill ${isDone ? 'status-done' : 'status-pending'}">
                                <i class="fa-solid ${isDone ? 'fa-check-circle' : 'fa-clock'} mr-1"></i>${isDone ? 'ลงระบบแล้ว' : 'ค้างลง'}
                            </span>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-3">
                        <div class="text-[10px] text-indigo-500 font-bold uppercase mb-1">${r.process || r.Process}</div>
                        <p class="text-sm text-slate-600">${r.details || '-'}</p>
                        <div class="text-[10px] text-slate-400 mt-2 italic text-right">ผู้รายงาน: ${r.reporter}</div>
                    </div>
                    ${isAdmin && !isDone ? `
                        <div class="pt-3 border-t border-slate-100">
                            <button onclick="confirmHrms('${r.id}', event)" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-xl text-[11px] font-bold shadow-md transition-all active:scale-95">
                                <i class="fa-solid fa-clipboard-check mr-1"></i> ยืนยันว่าลง HRMS เรียบร้อยแล้ว
                            </button>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
        }

        async function confirmHrms(id, event) {
            try {
                const btn = event.currentTarget;
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-1"></i>กำลังบันทึก...';

                await fetch(CONFIG.scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'updateHrms', id: id, hrmsStatus: 'TRUE' })
                });

                const idx = allRecords.findIndex(r => String(r.id) === String(id));
                if (idx !== -1) allRecords[idx].hrmsStatus = 'TRUE';

                showAlert('บันทึกสถานะลง HRMS แล้ว (Sheet Checkbox = TRUE)', 'success');
                render();
            } catch (e) {
                showAlert('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
                render();
            }
        }

        function toggleAdmin() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminLockBtn').classList.remove('text-indigo-600', 'bg-indigo-50');
                render();
                showAlert('ออกจากโหมด Admin', 'error');
            } else {
                document.getElementById('adminModal').classList.add('modal-active');
                document.getElementById('adminPass').focus();
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('modal-active');
            document.getElementById('adminPass').value = '';
        }

        function verifyAdmin() {
            if (document.getElementById('adminPass').value === CONFIG.adminPass) {
                isAdmin = true;
                document.getElementById('adminLockBtn').classList.add('text-indigo-600', 'bg-indigo-50');
                closeAdmin();
                render();
                showAlert('เข้าสู่โหมด Admin สำเร็จ', 'success');
            } else { showAlert('รหัสผ่านไม่ถูกต้อง', 'error'); }
        }

        function togglePendingFilter() {
            isPendingOnly = !isPendingOnly;
            const btn = document.getElementById('pendingHrmsBtn');
            btn.className = isPendingOnly ? 'text-[10px] font-bold px-3 py-1.5 rounded-full bg-rose-500 text-white shadow-md' : 'text-[10px] font-bold px-3 py-1.5 rounded-full border border-rose-200 text-rose-500 bg-rose-50';
            render();
        }

        function updateStats(data) {
            const s = { t: data.length, ab: 0, cd: 0, p: 0 };
            data.forEach(r => {
                if(['A','B'].includes(r.severity)) s.ab++;
                else if(['C','D'].includes(r.severity)) s.cd++;
                if(r.hrmsStatus !== 'TRUE' && r.hrmsStatus !== true) s.p++;
            });
            document.getElementById('statTotal').innerText = s.t;
            document.getElementById('statNearMiss').innerText = s.ab;
            document.getElementById('statError').innerText = s.cd;
            document.getElementById('statPending').innerText = s.p;
        }

        function initFilterOptions() {
            const mOpts = `<option value="all">เลือกเดือน</option>` + MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            document.getElementById('startMonth').innerHTML = mOpts;
            document.getElementById('endMonth').innerHTML = mOpts;
            const curY = new Date().getFullYear();
            let yOpts = `<option value="all">เลือกปี</option>`;
            for (let y = curY - 2; y <= curY + 1; y++) yOpts += `<option value="${y}">พ.ศ. ${y + 543}</option>`;
            document.getElementById('startYear').innerHTML = yOpts;
            document.getElementById('endYear').innerHTML = yOpts;
        }

        function resetFilters() {
            ['startMonth','startYear','endMonth','endYear'].forEach(id => document.getElementById(id).value = "all");
            isPendingOnly = false;
            document.getElementById('pendingHrmsBtn').className = 'text-[10px] font-bold px-3 py-1.5 rounded-full border border-rose-200 text-rose-500 bg-rose-50';
            render();
        }

        function resetForm() {
            ['hn','process','drugName','details','severity'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('eventDate').valueAsDate = new Date();
        }

        function showAlert(m, t) {
            const d = document.createElement('div');
            d.className = `p-4 rounded-2xl text-white text-center font-bold shadow-2xl animate-fade ${t==='success'?'bg-indigo-600':'bg-rose-600'}`;
            d.innerHTML = `<i class="fa-solid ${t==='success'?'fa-check-circle':'fa-circle-exclamation'} mr-2"></i>${m}`; 
            document.getElementById('alertContainer').appendChild(d);
            setTimeout(() => { d.style.opacity='0'; setTimeout(()=>d.remove(),400); }, 3000);
        }

        window.onload = () => {
            initFilterOptions();
            document.getElementById('eventDate').valueAsDate = new Date();
            fetchData();
            setInterval(fetchData, 60000);
        };
    </script>
</body>
</html>
